version: '3.8'

# ══════════════════════════════════════════════════════════════════
#  Stack DefectDojo — DevSecOps
#  Services : PostgreSQL · Redis · Celery Worker · DefectDojo
# ══════════════════════════════════════════════════════════════════

services:

  # ── Base de données ──────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: defectdojo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: defectdojo
      POSTGRES_PASSWORD: defectdojo
      POSTGRES_DB: defectdojo
    volumes:
      - defectdojo_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defectdojo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache / Queue ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: defectdojo-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Worker Celery (tâches asynchrones) ───────────────────────────
  celery-worker:
    image: defectdojo/defectdojo-django:latest
    container_name: defectdojo-celery-worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/entrypoint-celery-worker.sh"]
    environment:
      DD_DATABASE_URL: "postgresql://defectdojo:defectdojo@db:5432/defectdojo"
      DD_CELERY_BROKER_URL: "redis://redis:6379/0"
      DD_SECRET_KEY: "zT9F7xJv2sKQ4mYpL8wN3eR1cD6uH0aBqG5VtXk9PjU="
      DD_ALLOWED_HOSTS: "*"

  # ── Application Django DefectDojo ─────────────────────────────────
  defectdojo:
    image: defectdojo/defectdojo-django:latest
    container_name: defectdojo
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8081"
    environment:
      DD_DATABASE_URL: "postgresql://defectdojo:defectdojo@db:5432/defectdojo"
      DD_CELERY_BROKER_URL: "redis://redis:6379/0"
      DD_SECRET_KEY: "Qm8rZ2YpXc1N5KJdV0sT4bH7Wl3F9eUaR6CqP2kLnIg="
      DD_ALLOWED_HOSTS: "*"
      DD_ADMIN_USER: "admin"
      DD_ADMIN_PASSWORD: "Admin1234!"
      DD_ADMIN_MAIL: "admin@devsecops.local"
      DD_INITIALIZE: "true"
    volumes:
      - defectdojo_media:/app/media
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v2/users/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

# ── Volumes persistants ───────────────────────────────────────────
volumes:
  defectdojo_db:
  defectdojo_media: