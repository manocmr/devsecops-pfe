apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-app
  namespace: security-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-app
  template:
    metadata:
      labels:
        app: secure-app
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: secure-app
          image: nginx:latest
          ports:
            - containerPort: 8080
          securityContext:
            runAsUser: 1000
            runAsGroup: 3000
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
